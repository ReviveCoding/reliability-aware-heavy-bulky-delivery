name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: heavy-bulky-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            constraints-verified.txt
      - name: Install verified dependencies
        run: python -m pip install --constraint constraints-verified.txt -e ".[full,dev]"
      - name: Dependency integrity
        run: |
          python scripts/check_direct_dependencies.py
          python -m pip check
      - name: Static quality
        run: |
          python -m ruff format --check src scripts tests
          python -m ruff check src scripts tests
          python -m compileall -q src scripts tests
      - name: Test with coverage
        run: python -m pytest --cov=heavy_bulky --cov-report=term-missing --cov-report=json:reports/coverage.json


  windows-smoke:
    timeout-minutes: 20
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            constraints-verified.txt
      - name: Install verified dependencies
        run: python -m pip install --constraint constraints-verified.txt -e ".[full,dev]"
      - name: Windows local-equivalent smoke
        shell: pwsh
        run: |
          python -m pytest -q
          python -m heavy_bulky.cli full-pipeline --config configs/smoke.yaml --output-dir outputs/windows-smoke
          if (-not (Test-Path outputs/windows-smoke/_SUCCESS)) { throw "Missing success marker" }

  end-to-end:
    timeout-minutes: 20
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            constraints-verified.txt
      - run: python -m pip install --constraint constraints-verified.txt -e ".[full,dev]"
      - name: Local-equivalent validation
        run: bash scripts/run_full_validation.sh
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: heavy-bulky-validation
          path: |
            reports/full_pipeline_validation_report.md
            reports/full_pipeline_validation_summary.json
            reports/coverage.json
            reports/api_runtime_smoke.json
            reports/api_runtime_smoke.server.log
            outputs/validation_smoke
            outputs/validation_full
            outputs/validation_wheel_smoke
            artifacts/dist
          if-no-files-found: error
          retention-days: 14

  docker:
    timeout-minutes: 15
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build image
        run: docker build -t heavy-bulky-delivery-reliability:ci .
      - name: Container smoke
        run: |
          mkdir -p outputs/docker-smoke
          docker run --rm --user "$(id -u):$(id -g)" -e HOME=/tmp \
            -v "$PWD/outputs/docker-smoke:/app/outputs" \
            heavy-bulky-delivery-reliability:ci
          test -f outputs/docker-smoke/smoke/_SUCCESS
